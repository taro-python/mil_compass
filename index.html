<script>
    async function initSystem() {
        try {
            console.log("Initialization started...");
            // UIを即座に非表示
            document.getElementById('start-screen').style.display = 'none';
            
            // 1. 地図の準備
            map = L.map('map', { zoomControl: false });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { maxZoom: 18 }).addTo(map);
            
            // 2. センサー許可 (iOS)
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission !== 'granted') {
                    alert("センサーの許可が拒否されました。設定を確認してください。");
                } else {
                    window.addEventListener('deviceorientation', (e) => updateHeading(e.webkitCompassHeading || (e.absolute ? 360 - e.alpha : null)), true);
                }
            } else {
                window.addEventListener('deviceorientationabsolute', (e) => updateHeading(360 - e.alpha), true);
            }

            // 3. 位置情報の取得
            navigator.geolocation.watchPosition((pos) => {
                // 位置情報取得成功時の処理（既存通り）
                selfPos = [pos.coords.latitude, pos.coords.longitude];
                // ... (略) ...
            }, (err) => {
                alert("位置情報の取得に失敗しました: " + err.message);
            }, { enableHighAccuracy: true });

        } catch (error) {
            alert("システムエラーが発生しました: " + error.message);
        }
    }
</script>
