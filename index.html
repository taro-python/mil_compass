<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Tactical OS v5.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { background: #000; color: #00ff00; font-family: monospace; margin: 0; overflow: hidden; height: 100vh; }
        
        /* モード管理 */
        .mode-compass #map-ui { display: none; }
        .mode-map #compass-full { display: none; }
        .mode-map #compass-mini { display: block; }
        .mode-compass #compass-mini { display: none; }

        /* 地図照準 */
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 1001;
        }
        #crosshair::before { content:''; position:absolute; top:19px; left:0; width:40px; height:2px; background:#ff0000; }
        #crosshair::after { content:''; position:absolute; top:0; left:19px; width:2px; height:40px; background:#ff0000; }

        /* ミニコンパス (左下) */
        #compass-mini {
            position: absolute; bottom: 20px; left: 20px; width: 100px; height: 100px;
            z-index: 2000; border: 2px solid #00ff00; border-radius: 50%;
            background: rgba(0,0,0,0.6); pointer-events: none;
        }
        #mini-face { width: 100%; height: 100%; position: relative; }
        #mini-needle { width: 2px; height: 50px; background: #ff0000; position: absolute; left: 50%; top: 0; transform: translateX(-50%); }

        /* 情報パネル */
        #info-panel { 
            position: absolute; top: 10px; right: 10px; z-index: 2000;
            background: rgba(0,0,0,0.8); padding: 10px; border-radius: 5px; border: 1px solid #00ff00;
        }
        .val { font-size: 1rem; font-weight: bold; display: block; }
        .label { font-size: 0.6rem; color: #888; }
        #range-val { color: #ffff00; font-size: 1.2rem; } /* 距離は黄色で強調 */

        /* コンパス（フル） */
        #compass-full { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #face-full { width: 300px; height: 300px; border: 4px solid #00ff00; border-radius: 50%; position: relative; }
        #needle-full { width: 4px; height: 160px; background: #ff0000; position: absolute; left: 50%; top: -10px; transform: translateX(-50%); }

        /* UI */
        #menu-btn { position: absolute; top: 15px; left: 15px; font-size: 2rem; z-index: 3000; cursor: pointer; }
        #side-menu { position: fixed; top: 0; left: -260px; width: 250px; height: 100%; background: #111; z-index: 4000; transition: 0.3s; border-right: 1px solid #00ff00; }
        #side-menu.open { left: 0; }
        #map { width: 100%; height: 100%; }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; align-items: center; justify-content: center; }
    </style>
</head>
<body class="mode-compass">

    <div id="start-screen" onclick="initSystem()"><h1>SYSTEM START</h1></div>

    <div id="menu-btn" onclick="toggleMenu()">&#9776;</div>
    <div id="side-menu">
        <div style="padding:20px; border-bottom:1px solid #333;">TACTICAL MENU</div>
        <div style="padding:15px;" onclick="switchMode('compass')">＞ COMPASS MODE</div>
        <div style="padding:15px;" onclick="switchMode('map')">＞ MAP MODE</div>
        <div style="padding:15px;" onclick="toggleMenu()">CLOSE</div>
    </div>

    <div id="info-panel">
        <span class="label">SELF MGRS</span><span id="self-mgrs" class="val">---</span>
        <span class="label">CENTER MGRS</span><span id="center-mgrs" class="val">---</span>
        <hr style="border:0; border-top:1px solid #333;">
        <span class="label">RANGE (中心まで)</span><span id="range-val" class="val">0 m</span>
    </div>

    <div id="compass-full">
        <div id="face-full"><div id="needle-full"></div></div>
        <div id="mil-display" style="font-size:3.5rem; margin-top:40px;">0000 MIL</div>
    </div>

    <div id="map-ui">
        <div id="crosshair"></div>
        <div id="map"></div>
        <div id="compass-mini"><div id="mini-face"><div id="mini-needle"></div></div></div>
    </div>

    <script>
        let map, selfMarker, selfPos = [35, 139], currentDeclination = 0;
        const faceFull = document.getElementById('face-full');
        const faceMini = document.getElementById('mini-face');

        // 目盛り描画
        [faceFull, faceMini].forEach(f => {
            const isMini = f.id === 'mini-face';
            for (let i = 0; i < 32; i++) {
                const d = document.createElement('div');
                d.style.cssText = `position:absolute;width:100%;height:100%;transform:rotate(${i*11.25}deg);`;
                const t = document.createElement('div');
                t.style.cssText = `width:${isMini?1:2}px;height:${i%4?(isMini?5:15):(isMini?10:30)}px;background:#00ff00;margin:0 auto;`;
                d.appendChild(t);
                f.appendChild(d);
            }
        });

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function switchMode(m) { 
            document.body.className = 'mode-' + m; 
            if(m==='map') {
                setTimeout(() => {
                    map.invalidateSize();
                    map.setView(selfPos, 16); // マップ切替時に自己位置へジャンプ
                }, 200);
            }
            toggleMenu(); 
        }

        async function initSystem() {
            document.getElementById('start-screen').style.display = 'none';
            if (typeof DeviceOrientationEvent.requestPermission === 'function') await DeviceOrientationEvent.requestPermission();

            // 地図初期化 (航空写真のみ)
            map = L.map('map', { zoomControl: false });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', {
                attribution: "地理院写真"
            }).addTo(map);

            selfMarker = L.circleMarker([0,0], { color: '#00ff00', radius: 6 }).addTo(map);

            // 距離計算と中心座標更新
            map.on('move', () => {
                const center = map.getCenter();
                const latlngCenter = L.latLng(center.lat, center.lng);
                const latlngSelf = L.latLng(selfPos[0], selfPos[1]);
                
                // 距離計算 (メートル)
                const dist = latlngSelf.distanceTo(latlngCenter);
                document.getElementById('range-val').innerText = `${Math.round(dist).toLocaleString()} m`;
                document.getElementById('center-mgrs').innerText = mgrs.forward([center.lng, center.lat]);
            });

            // GPS監視
            navigator.geolocation.watchPosition((pos) => {
                selfPos = [pos.coords.latitude, pos.coords.longitude];
                selfMarker.setLatLng(selfPos);
                document.getElementById('self-mgrs').innerText = mgrs.forward([selfPos[1], selfPos[0]]);
                
                // 初回のみ地図を自己位置へ移動
                if (!window.initialLocationSet) {
                    map.setView(selfPos, 16);
                    window.initialLocationSet = true;
                }
                currentDeclination = - ( (selfPos[0] - 37) * 0.2 + (selfPos[1] - 135) * 0.1 + 7.5 );
            }, null, { enableHighAccuracy: true });

            // 方位監視
            window.addEventListener('deviceorientation', (e) => {
                let h = e.webkitCompassHeading || (360 - e.alpha);
                if (h) {
                    let trueH = (h + currentDeclination + 360) % 360;
                    faceFull.style.transform = `rotate(-${trueH}deg)`;
                    faceMini.style.transform = `rotate(-${trueH}deg)`;
                    document.getElementById('mil-display').innerText = Math.round(trueH * (6400 / 360)).toString().padStart(4, '0') + " MIL";
                }
            });
        }
    </script>
</body>
</html>
