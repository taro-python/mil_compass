<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TACTICAL OS v5.5 Precision</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- 基本スタイル (前回を維持) --- */
        body { background: #000; color: #00ff00; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        .mode-compass #map-ui, .mode-compass #info-map { display: none; }
        .mode-map #compass-full, .mode-map #info-compass { display: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 1001;
        }
        #crosshair::before { content:''; position:absolute; top:19px; left:0; width:40px; height:2px; background:#ff0000; }
        #crosshair::after { content:''; position:absolute; top:0; left:19px; width:2px; height:40px; background:#ff0000; }

        #compass-mini {
            position: absolute; bottom: 35px; left: 20px; width: 90px; height: 90px;
            z-index: 2000; border: 2px solid #00ff00; border-radius: 50%;
            background: rgba(0,0,0,0.7); pointer-events: none;
        }
        #mini-val { position: absolute; bottom: -25px; width: 100%; text-align: center; color: #00ff00; font-weight: bold; font-size: 0.9rem; }

        .info-panel { 
            position: absolute; top: 10px; right: 10px; z-index: 2000;
            background: rgba(0,0,0,0.85); padding: 8px; border-radius: 5px; border: 1px solid #00ff00;
            min-width: 210px; box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
        .val { font-size: 0.95rem; font-weight: bold; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .label { font-size: 0.65rem; color: #888; display: block; margin-bottom: 1px; font-weight: bold; }

        #compass-full { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #face-full { width: 280px; height: 280px; border: 4px solid #00ff00; border-radius: 50%; position: relative; }
        #needle-fixed { width: 4px; height: 140px; background: #ff0000; position: absolute; left: 50%; top: 0; transform: translateX(-50%); z-index: 10; }

        .cardinal {
            position: absolute; width: 100%; height: 100%; top: 0; left: 0;
            display: flex; justify-content: center; font-weight: bold; font-family: monospace; pointer-events: none;
        }
        .cardinal span { position: absolute; top: -25px; font-size: 1.2rem; }
        .mini-cardinal span { top: -18px; font-size: 0.8rem; }

        #menu-btn { position: absolute; top: 15px; left: 15px; font-size: 2rem; z-index: 4500; cursor: pointer; color: #00ff00; }
        #menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 3900; display: none; }
        #side-menu { position: fixed; top: 0; left: -260px; width: 250px; height: 100%; background: #111; z-index: 4000; transition: 0.3s; border-right: 1px solid #00ff00; }
        #side-menu.open { left: 0; }
        #map { width: 100%; height: 100%; position: absolute; background: #111; touch-action: none; } /* タッチ制御のため追加 */

        .t-btn {
            position: absolute; z-index: 3000; display: none;
            background: rgba(0, 20, 0, 0.85); color: #00ff00;
            border: 1px solid #00ff00; font-family: monospace;
            font-weight: bold; font-size: 11px; cursor: pointer;
            padding: 10px 5px; width: 95px; text-align: center;
        }
        .mode-map .t-btn { display: block; }
        #list-btn  { bottom: 65px;  right: 15px; }                   
        #input-btn { bottom: 120px; right: 15px; }                   
        #plot-btn  { bottom: 175px; right: 15px; border-width: 2px; } 

        .ext-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; background: #050a05; border: 1px solid #00ff00;
            z-index: 5000; display: none; flex-direction: column; padding: 20px;
        }
        .ext-input, .p2p-select { background: #000; color: #00ff00; border: 1px solid #004400; width: 100%; padding: 12px; margin: 10px 0; box-sizing: border-box; }
        .direction-marker { width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent; border-bottom: 20px solid #00ff00; }
        .custom-marker-html { display: flex; align-items: center; justify-content: center; color: #ff0000; font-size: 22px; font-weight: bold; }
    </style>
</head>
<body class="mode-compass">

    <div id="start-screen" onclick="initSystem()">
        <h2 style="color:#00ff00; letter-spacing: 4px;">TACTICAL OS LITE</h2>
        <p style="color:#00ff00; animation: blink 1.5s infinite;">画面をタップしてシステム起動</p>
    </div>

    <div id="menu-overlay" onclick="toggleMenu()"></div>
    <div id="menu-btn" onclick="toggleMenu()">&#9776;</div>
    <div id="side-menu">
        <div style="padding:20px; border-bottom:1px solid #333; font-weight:bold; color:#888;">タクティカルメニュー</div>
        <div class="custom-menu-item" onclick="switchMode('compass')">＞ コンパスモード</div>
        <div class="custom-menu-item" onclick="switchMode('map')">＞ マップモード</div>
        <div id="menu-ext-area"></div> 
        <div class="custom-menu-item" onclick="toggleMenu()" style="color:#666;">閉じる</div>
    </div>

    <div id="info-compass" class="info-panel">
        <span class="label">現在地 MGRS</span><span id="self-mgrs-c" class="val">GPS待機中...</span>
    </div>

    <div id="info-map" class="info-panel">
        <span class="label">現在地 MGRS</span><div class="val"><span id="self-mgrs-m">---</span></div>
        <span class="label">中心点 MGRS</span><div class="val"><span id="center-mgrs">---</span></div>
        <span class="label">距離 / 方位 (中心点まで)</span>
        <div class="val"><span id="range-val" style="color:#ffff00;">0 m</span><span id="bearing-val">0000 MIL</span></div>
    </div>

    <div id="compass-full">
        <div style="position:relative; width:280px; height:280px;">
            <div id="needle-fixed"></div>
            <div id="face-full"></div>
        </div>
        <div id="mil-display-f" style="font-size:3.5rem; margin-top:40px; font-weight:bold;">0000 MIL</div>
    </div>

    <div id="map-ui" style="width:100%; height:100%; position:relative;">
        <div id="crosshair"></div>
        <div id="map"></div>
        <div id="compass-mini">
            <div id="mini-face-container" style="width:100%; height:100%; position:relative;">
                <div id="mini-needle" style="width:2px; height:45px; background:#ff0000; position:absolute; left:50%; top:0; transform:translateX(-50%); z-index:10;"></div>
                <div id="mini-face" style="width:100%; height:100%; position:relative;"></div>
            </div>
            <div id="mini-val">0000</div>
        </div>
        <div id="plot-btn" class="t-btn">中心点を<br>マーク</div>
        <div id="input-btn" class="t-btn">座標を<br>直接入力</div>
        <div id="list-btn" class="t-btn">ログ一覧</div>
    </div>

    <div id="input-panel" class="ext-panel">
        <div style="font-size:14px; border-bottom:1px solid #00ff00; padding-bottom:5px;">手動座標プロット</div>
        <input type="text" id="m-name" class="ext-input" placeholder="名称">
        <input type="text" id="m-coord" class="ext-input" placeholder="MGRS座標">
        <div style="display:flex; gap:10px;"><button class="t-btn" style="position:static; flex:1; width:auto; background:#004400;" onclick="execManualPlot()">決定</button><button class="t-btn" style="position:static; flex:1; width:auto;" onclick="closePanel('input-panel')">中止</button></div>
    </div>
    <div id="plot-list-panel" class="ext-panel">
        <div id="plot-list-content" style="overflow-y:auto; max-height:50vh;"></div>
        <button class="t-btn" style="position:static; width:100%; margin-top:10px;" onclick="closePanel('plot-list-panel')">戻る</button>
    </div>
    <div id="p2p-calc-panel" class="ext-panel">
        <div style="font-size:14px; border-bottom:1px solid #00ff00; padding-bottom:5px;">2地点間計算</div>
        <select id="p2p-from" class="p2p-select"></select><select id="p2p-to" class="p2p-select"></select>
        <div style="background:rgba(0,30,0,0.9); padding:10px; border:1px solid #00ff00;">
            距離: <span id="res-dist" style="color:#ffff00;">---</span><br>方位: <span id="res-azimuth" style="color:#ffff00;">---</span>
        </div>
        <button class="t-btn" style="position:static; width:100%; margin-top:10px;" onclick="closePanel('p2p-calc-panel')">閉じる</button>
    </div>

    <script>
        let map, selfMarker, selfPos = null, currentDeclination = 0;
        const faceFull = document.getElementById('face-full'), faceMini = document.getElementById('mini-face');
        let savedPlots = JSON.parse(localStorage.getItem('tactical_plots') || '[]');
        let markersOnMap = [];

        // コンパス描画
        function drawTicks(el, isMini) {
            const marks = [{a:0,t:'N'}, {a:90,t:'E'}, {a:180,t:'S'}, {a:270,t:'W'}];
            marks.forEach(m => {
                const d = document.createElement('div'); d.className = isMini ? 'cardinal mini-cardinal' : 'cardinal';
                d.style.transform = `rotate(${m.a}deg)`; d.innerHTML = `<span>${m.t}</span>`; el.appendChild(d);
            });
            for (let i = 0; i < 32; i++) {
                const d = document.createElement('div'); d.style.cssText = `position:absolute;width:100%;height:100%;transform:rotate(${i*11.25}deg);`;
                const t = document.createElement('div'); t.style.cssText = `width:${isMini?1:2}px;height:${i%4?(isMini?5:15):(isMini?10:30)}px;background:#00ff00;margin:0 auto;`;
                d.appendChild(t); el.appendChild(d);
            }
        }
        drawTicks(faceFull, false); drawTicks(faceMini, true);

        // メニュー
        function toggleMenu() { 
            const menu = document.getElementById('side-menu'); const overlay = document.getElementById('menu-overlay');
            const isOpen = menu.classList.toggle('open'); overlay.style.display = isOpen ? 'block' : 'none';
        }
        function switchMode(m) { 
            document.body.className = 'mode-' + m; 
            if(m==='map' && map) setTimeout(() => { map.invalidateSize(); if(selfPos) map.setView(selfPos, 17); }, 300);
            toggleMenu();
        }

        // --- ワンハンドズーム (ダブルタップ・ドラッグ) の実装 ---
        let lastTapTime = 0, isZooming = false, startY = 0, startZoom = 0;
        
        function setupOneHandZoom() {
            const mapEl = document.getElementById('map');
            mapEl.addEventListener('touchstart', (e) => {
                if (e.touches.length !== 1) return;
                const now = Date.now();
                if (now - lastTapTime < 300) {
                    isZooming = true;
                    startY = e.touches[0].pageY;
                    startZoom = map.getZoom();
                    e.preventDefault();
                }
                lastTapTime = now;
            }, { passive: false });

            mapEl.addEventListener('touchmove', (e) => {
                if (!isZooming) return;
                const deltaY = startY - e.touches[0].pageY;
                const zoomChange = deltaY / 50; // 感度調整
                map.setZoom(startZoom + zoomChange, { animate: false });
                e.preventDefault();
            }, { passive: false });

            mapEl.addEventListener('touchend', () => { isZooming = false; });
        }

        // 基本ロジック
        function updateHeading(h) {
            if (h === null) return;
            const trueH = (h + currentDeclination + 360) % 360;
            const milVal = Math.round(trueH * (6400 / 360)).toString().padStart(4, '0');
            faceFull.style.transform = `rotate(-${trueH}deg)`; faceMini.style.transform = `rotate(-${trueH}deg)`;
            document.getElementById('mil-display-f').innerText = milVal + " MIL";
            document.getElementById('mini-val').innerText = milVal;
            if(document.getElementById('self-arrow')) document.getElementById('self-arrow').style.transform = `rotate(${trueH}deg)`;
        }

        async function initSystem() {
            document.getElementById('start-screen').style.display = 'none';
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', (e) => updateHeading(e.webkitCompassHeading || 360-e.alpha), true);
            } else window.addEventListener('deviceorientationabsolute', (e) => updateHeading(360 - e.alpha), true);

            map = L.map('map', { zoomControl: false, attributionControl: false, doubleClickZoom: false }); // デフォルトのダブルクリックズームをオフ
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { maxZoom: 18 }).addTo(map);
            selfMarker = L.marker([0,0], { icon: L.divIcon({ className:'d-marker', html:'<div id="self-arrow" class="direction-marker"></div>', iconSize:[20,20], iconAnchor:[10,10]}) }).addTo(map);
            
            setupOneHandZoom(); // ズーム機能の有効化
            restorePlots();

            // 拡張メニュー
            const p2pEntry = document.createElement('div'); p2pEntry.className = 'custom-menu-item'; p2pEntry.innerHTML = '＞ 2地点間ナビ計算機';
            p2pEntry.onclick = () => {
                const opts = savedPlots.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
                document.getElementById('p2p-from').innerHTML = opts; document.getElementById('p2p-to').innerHTML = opts;
                document.getElementById('p2p-calc-panel').style.display = 'flex'; toggleMenu();
            };
            document.getElementById('menu-ext-area').appendChild(p2pEntry);

            map.on('move', () => {
                const c = map.getCenter();
                document.getElementById('center-mgrs').innerText = mgrs.forward([c.lng, c.lat]);
                if(selfPos) {
                    const d = L.latLng(selfPos).distanceTo(c);
                    document.getElementById('range-val').innerText = `${Math.round(d)} m`;
                    const y = Math.sin((c.lng-selfPos[1])*Math.PI/180)*Math.cos(c.lat*Math.PI/180);
                    const x = Math.cos(selfPos[0]*Math.PI/180)*Math.sin(c.lat*Math.PI/180)-Math.sin(selfPos[0]*Math.PI/180)*Math.cos(c.lat*Math.PI/180)*Math.cos((c.lng-selfPos[1])*Math.PI/180);
                    document.getElementById('bearing-val').innerText = `${Math.round(((Math.atan2(y,x)*180/Math.PI+360)%360)*(6400/360)).toString().padStart(4,'0')} MIL`;
                }
            });

            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude; selfPos = [lat, lon];
                const m = mgrs.forward([lon, lat]);
                document.getElementById('self-mgrs-c').innerText = m; document.getElementById('self-mgrs-m').innerText = m;
                if (!window.initialSet) { map.setView(selfPos, 17); window.initialSet = true; }
                selfMarker.setLatLng(selfPos);
                currentDeclination = - ( (lat - 37) * 0.2 + (lon - 135) * 0.1 + 7.5 );
            }, null, { enableHighAccuracy: true });
        }

        // プロット関連
        function addMarkerToMap(p) {
            const icon = L.divIcon({ className: 'custom-marker-html', html: `<div>●</div>`, iconSize: [30, 30] });
            const marker = L.marker([p.lat, p.lng], {icon: icon}).addTo(map);
            marker.bindPopup(`<b>${p.name}</b><br>${p.mgrs}`); markersOnMap.push(marker);
        }
        function restorePlots() { markersOnMap.forEach(m => map.removeLayer(m)); markersOnMap = []; savedPlots.forEach(p => addMarkerToMap(p)); }
        window.closePanel = (id) => document.getElementById(id).style.display = 'none';
        document.getElementById('plot-btn').onclick = () => {
            const n = prompt("地点名:", "WP-" + (savedPlots.length+1));
            if (n) { const c = map.getCenter(); const m = mgrs.forward([c.lng, c.lat]); savedPlots.push({lat:c.lat, lng:c.lng, mgrs:m, name:n, dist:'---'}); localStorage.setItem('tactical_plots', JSON.stringify(savedPlots)); restorePlots(); }
        };
        document.getElementById('input-btn').onclick = () => document.getElementById('input-panel').style.display = 'flex';
        window.execManualPlot = () => {
            const n = document.getElementById('m-name').value || "WP"; const c = document.getElementById('m-coord').value.trim();
            try { const d = mgrs.toPoint(c); savedPlots.push({lat:d[1], lng:d[0], mgrs:c, name:n, dist:'---'}); localStorage.setItem('tactical_plots', JSON.stringify(savedPlots)); restorePlots(); closePanel('input-panel'); map.setView([d[1], d[0]], 17); } catch(e) { alert("MGRS Error"); }
        };
        document.getElementById('list-btn').onclick = () => {
            document.getElementById('plot-list-content').innerHTML = savedPlots.map((p, i) => `<div style="border-bottom:1px solid #002200; padding:10px; display:flex; justify-content:space-between;"><div><b>${p.name}</b><br>${p.mgrs}</div><button onclick="deletePlot(${i})" style="color:red; background:none; border:1px solid red;">消去</button></div>`).join('');
            document.getElementById('plot-list-panel').style.display = 'flex';
        };
        window.deletePlot = (i) => { savedPlots.splice(i, 1); localStorage.setItem('tactical_plots', JSON.stringify(savedPlots)); restorePlots(); document.getElementById('list-btn').onclick(); };
    </script>
</body>
</html>
