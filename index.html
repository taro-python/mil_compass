<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>TACTICAL OS v5.4 JP (Final)</title>
    
    <script src="https://cdn.jsdelivr.net/npm/mgrs@1.0.0/dist/mgrs.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        /* --- 基本スタイル --- */
        body { background: #000; color: #00ff00; font-family: sans-serif; margin: 0; overflow: hidden; height: 100vh; width: 100vw; }
        .mode-compass #map-ui, .mode-compass #info-map { display: none; }
        .mode-map #compass-full, .mode-map #info-compass { display: none; }
        
        #crosshair {
            position: absolute; top: 50%; left: 50%; width: 40px; height: 40px;
            transform: translate(-50%, -50%); pointer-events: none; z-index: 1001;
        }
        #crosshair::before { content:''; position:absolute; top:19px; left:0; width:40px; height:2px; background:#ff0000; }
        #crosshair::after { content:''; position:absolute; top:0; left:19px; width:2px; height:40px; background:#ff0000; }

        #compass-mini {
            position: absolute; bottom: 30px; left: 20px; width: 90px; height: 90px;
            z-index: 2000; border: 2px solid #00ff00; border-radius: 50%;
            background: rgba(0,0,0,0.7); pointer-events: none;
        }
        #mini-val { position: absolute; bottom: -25px; width: 100%; text-align: center; color: #00ff00; font-weight: bold; font-size: 0.9rem; }

        .info-panel { 
            position: absolute; top: 10px; right: 10px; z-index: 2000;
            background: rgba(0,0,0,0.85); padding: 8px; border-radius: 5px; border: 1px solid #00ff00;
            min-width: 210px; box-shadow: 0 0 10px rgba(0,255,0,0.2);
        }
        .val { font-size: 0.95rem; font-weight: bold; display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; }
        .label { font-size: 0.65rem; color: #888; display: block; margin-bottom: 1px; font-weight: bold; }
        .alt-val { font-size: 0.85rem; color: #00ffff; font-family: monospace; }

        #compass-full { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        #face-full { width: 280px; height: 280px; border: 4px solid #00ff00; border-radius: 50%; position: relative; }
        #needle-fixed { width: 4px; height: 150px; background: #ff0000; position: absolute; left: 50%; top: -10px; transform: translateX(-50%); z-index: 10; }

        .direction-marker {
            width: 0; height: 0; border-left: 10px solid transparent; border-right: 10px solid transparent;
            border-bottom: 20px solid #00ff00; filter: drop-shadow(0 0 5px #00ff00);
        }

        #menu-btn { position: absolute; top: 15px; left: 15px; font-size: 2rem; z-index: 3500; cursor: pointer; color: #00ff00; }
        #side-menu { position: fixed; top: 0; left: -260px; width: 250px; height: 100%; background: #111; z-index: 4000; transition: 0.3s; border-right: 1px solid #00ff00; }
        #side-menu.open { left: 0; }
        #map { width: 100%; height: 100%; position: absolute; background: #111; }
        #start-screen { position: fixed; inset: 0; background: #000; z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }

        /* --- 拡張ボタン・パネル --- */
        .t-btn {
            position: absolute; z-index: 3000; display: none;
            background: rgba(0, 20, 0, 0.85); color: #00ff00;
            border: 1px solid #00ff00; font-family: monospace;
            font-weight: bold; font-size: 11px; cursor: pointer;
            padding: 10px 5px; width: 95px; text-align: center;
        }
        .mode-map .t-btn { display: block; }
        #list-btn  { bottom: 65px;  right: 15px; }                   
        #input-btn { bottom: 120px; right: 15px; }                   
        #plot-btn  { bottom: 175px; right: 15px; border-width: 2px; } 

        .ext-panel {
            position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; max-width: 350px; max-height: 80vh;
            background: #050a05; border: 1px solid #00ff00;
            z-index: 5000; display: none; flex-direction: column; padding: 20px;
            box-shadow: 0 0 30px rgba(0, 255, 0, 0.3); color: #00ff00;
        }
        .ext-input, .p2p-select { background: #000; color: #00ff00; border: 1px solid #004400; width: 100%; padding: 12px; margin: 10px 0; font-family: monospace; outline: none; box-sizing: border-box; }
        .result-box { background: rgba(0, 30, 0, 0.9); border: 1px solid #00ff00; padding: 15px; margin-top: 10px; }
        .result-line { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .result-val { color: #ffff00; font-weight: bold; }

        .custom-menu-item { cursor: pointer; padding: 15px; border-bottom: 1px solid #003300; color: #00ff00; font-size: 13px; width: 100%; box-sizing: border-box; }
        .custom-marker-html { display: flex; align-items: center; justify-content: center; color: #ff0000; font-size: 22px; font-weight: bold; text-shadow: 0 0 4px #000; }
        .leaflet-popup-content-wrapper { background: #000 !important; color: #00ff00 !important; border: 1px solid #00ff00; border-radius: 0; }
        
        @keyframes blink { 0% {opacity:1;} 50% {opacity:0.3;} 100% {opacity:1;} }
    </style>
</head>
<body class="mode-compass">

    <div id="start-screen" onclick="initSystem()">
        <h2 style="color:#00ff00; letter-spacing: 4px;">TACTICAL OS v5.4</h2>
        <p style="color:#00ff00; animation: blink 1.5s infinite;">画面をタップしてシステム起動</p>
    </div>

    <div id="menu-btn" onclick="toggleMenu()">&#9776;</div>
    <div id="side-menu">
        <div style="padding:20px; border-bottom:1px solid #333; font-weight:bold; color:#888;">タクティカルメニュー</div>
        <div class="custom-menu-item" onclick="switchMode('compass')">＞ コンパスモード</div>
        <div class="custom-menu-item" onclick="switchMode('map')">＞ マップモード</div>
        <div id="menu-ext-area"></div> 
        <div class="custom-menu-item" onclick="toggleMenu()" style="color:#666;">閉じる</div>
    </div>

    <div id="info-compass" class="info-panel">
        <span class="label">現在地 MGRS</span><span id="self-mgrs-c" class="val">GPS待機中...</span>
    </div>

    <div id="info-map" class="info-panel">
        <span class="label">現在地 MGRS / 標高</span>
        <div class="val">
            <span id="self-mgrs-m">---</span>
            <span id="self-alt" class="alt-val">取得中...</span>
        </div>
        <span class="label">中心点 MGRS / 標高</span>
        <div class="val">
            <span id="center-mgrs">---</span>
            <span id="center-alt" class="alt-val">取得中...</span>
        </div>
        <span class="label">距離 / 方位 (中心点まで)</span>
        <div class="val">
            <span id="range-val" style="color:#ffff00;">0 m</span>
            <span id="bearing-val" style="color:#00ff00;">0000 MIL</span>
        </div>
    </div>

    <div id="compass-full">
        <div style="position:relative; width:280px; height:280px;">
            <div id="needle-fixed"></div>
            <div id="face-full"></div>
        </div>
        <div id="mil-display-f" style="font-size:3.5rem; margin-top:40px; font-weight:bold;">0000 MIL</div>
    </div>

    <div id="map-ui" style="width:100%; height:100%; position:relative;">
        <div id="crosshair"></div>
        <div id="map"></div>
        <div id="compass-mini">
            <div id="mini-face-container" style="width:100%; height:100%; position:relative;">
                <div id="mini-needle" style="width:2px; height:45px; background:#ff0000; position:absolute; left:50%; top:0; transform:translateX(-50%); z-index:10;"></div>
                <div id="mini-face" style="width:100%; height:100%; position:relative;"></div>
            </div>
            <div id="mini-val">0000</div>
        </div>

        <div id="plot-btn" class="t-btn">中心点を<br>マーク</div>
        <div id="input-btn" class="t-btn">座標を<br>直接入力</div>
        <div id="list-btn" class="t-btn">ログ一覧</div>
    </div>

    <div id="input-panel" class="ext-panel">
        <div style="font-size:14px; margin-bottom:15px; border-bottom:1px solid #00ff00; padding-bottom:5px;">手動座標プロット</div>
        <input type="text" id="m-name" class="ext-input" placeholder="名称">
        <input type="text" id="m-coord" class="ext-input" placeholder="MGRS座標">
        <div style="display:flex; gap:10px;">
            <button class="t-btn" style="position:static; flex:1; width:auto; background:#004400;" onclick="execManualPlot()">決定</button>
            <button class="t-btn" style="position:static; flex:1; width:auto;" onclick="closePanel('input-panel')">中止</button>
        </div>
    </div>

    <div id="plot-list-panel" class="ext-panel">
        <div style="font-size:14px; margin-bottom:15px; border-bottom:1px solid #00ff00; padding-bottom:5px;">タクティカルログ</div>
        <div id="plot-list-content" style="overflow-y:auto; flex-grow:1; max-height:50vh;"></div>
        <button class="t-btn" style="position:static; width:100%; margin-top:15px;" onclick="closePanel('plot-list-panel')">戻る</button>
    </div>

    <div id="p2p-calc-panel" class="ext-panel">
        <div style="font-size:14px; margin-bottom:15px; border-bottom:1px solid #00ff00; padding-bottom:5px;">2地点間ナビ計算機</div>
        <label style="font-size:10px;">FROM</label>
        <select id="p2p-from" class="p2p-select"></select>
        <label style="font-size:10px;">TO</label>
        <select id="p2p-to" class="p2p-select"></select>
        <div class="result-box">
            <div class="result-line"><span>距離:</span> <span id="res-dist" class="result-val">---</span></div>
            <div class="result-line"><span>方位:</span> <span id="res-azimuth" class="result-val">---</span></div>
        </div>
        <button class="t-btn" style="position:static; width:100%; margin-top:15px;" onclick="closePanel('p2p-calc-panel')">閉じる</button>
    </div>

    <script>
        /* --- ロジック --- */
        let map, selfMarker, selfPos = null, currentDeclination = 0, altTimeout;
        const faceFull = document.getElementById('face-full'), faceMini = document.getElementById('mini-face');
        let savedPlots = JSON.parse(localStorage.getItem('tactical_plots') || '[]');
        let markersOnMap = [];

        function drawTicks(el, isMini) {
            for (let i = 0; i < 32; i++) {
                const d = document.createElement('div');
                d.style.cssText = `position:absolute;width:100%;height:100%;transform:rotate(${i*11.25}deg);`;
                const t = document.createElement('div');
                t.style.cssText = `width:${isMini?1:2}px;height:${i%4?(isMini?5:15):(isMini?10:30)}px;background:#00ff00;margin:0 auto;`;
                d.appendChild(t); el.appendChild(d);
            }
        }
        drawTicks(faceFull, false); drawTicks(faceMini, true);

        function toggleMenu() { document.getElementById('side-menu').classList.toggle('open'); }
        function switchMode(m) { 
            document.body.className = 'mode-' + m; 
            if(m==='map' && map) setTimeout(() => { map.invalidateSize(); if(selfPos) map.setView(selfPos, 17); }, 300);
            if(document.getElementById('side-menu').classList.contains('open')) toggleMenu(); 
        }

        function updateHeading(h) {
            if (h === null) return;
            const trueH = (h + currentDeclination + 360) % 360;
            const milVal = Math.round(trueH * (6400 / 360)).toString().padStart(4, '0');
            faceFull.style.transform = `rotate(-${trueH}deg)`;
            faceMini.style.transform = `rotate(-${trueH}deg)`;
            document.getElementById('mil-display-f').innerText = milVal + " MIL";
            document.getElementById('mini-val').innerText = milVal;
            const arrow = document.getElementById('self-arrow');
            if(arrow) arrow.style.transform = `rotate(${trueH}deg)`;
        }

        /* --- 標高機能の呼び出し (本体側) --- */
        function fetchElevation(lat, lon, elementId) {
            // 外部ファイル elevation.js の機能が存在するかチェックして実行
            if (window.GSI && typeof GSI.getAlt === 'function') {
                GSI.getAlt(lat, lon, elementId);
            }
        }

        function getMilBearing(p1, p2) {
            const lat1 = p1[0] * Math.PI / 180, lon1 = p1[1] * Math.PI / 180;
            const lat2 = p2[0] * Math.PI / 180, lon2 = p2[1] * Math.PI / 180;
            const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
            const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
            let brg = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
            return Math.round(brg * (6400 / 360)).toString().padStart(4, '0');
        }

        window.closePanel = (id) => document.getElementById(id).style.display = 'none';

        function addMarkerToMap(p) {
            const icon = L.divIcon({ className: 'custom-marker-html', html: `<div>●</div>`, iconSize: [30, 30] });
            const marker = L.marker([p.lat, p.lng], {icon: icon}).addTo(map);
            marker.bindPopup(`<b>${p.name}</b><br>MGRS: ${p.mgrs}<br>距離: ${p.dist}`);
            markersOnMap.push(marker);
        }

        function restorePlots() {
            markersOnMap.forEach(m => map.removeLayer(m));
            markersOnMap = [];
            savedPlots.forEach(p => addMarkerToMap(p));
        }

        function saveAndPlot(lat, lng, mgrsCoord, name) {
            let dStr = selfPos ? `${Math.round(L.latLng(selfPos).distanceTo([lat, lng]))}m` : "---";
            const newPlot = { lat, lng, mgrs: mgrsCoord, name, dist: dStr };
            savedPlots.push(newPlot);
            localStorage.setItem('tactical_plots', JSON.stringify(savedPlots));
            addMarkerToMap(newPlot);
        }

        window.execManualPlot = () => {
            const name = document.getElementById('m-name').value || "地点";
            const coord = document.getElementById('m-coord').value.trim();
            try {
                const decoded = mgrs.toPoint(coord);
                saveAndPlot(decoded[1], decoded[0], coord, name);
                closePanel('input-panel');
                map.setView([decoded[1], decoded[0]], 17);
            } catch(e) { alert("座標エラー"); }
        };

        function calculateP2P() {
            const f = document.getElementById('p2p-from').value, t = document.getElementById('p2p-to').value;
            if (f==="" || t==="" || f===t) return;
            const p1 = L.latLng(savedPlots[f].lat, savedPlots[f].lng), p2 = L.latLng(savedPlots[t].lat, savedPlots[t].lng);
            const dist = p1.distanceTo(p2);
            let brg = (Math.atan2(p2.lng - p1.lng, p2.lat - p1.lat) * 180 / Math.PI + 360) % 360;
            document.getElementById('res-dist').innerText = dist > 1000 ? (dist/1000).toFixed(2) + " km" : Math.round(dist) + " m";
            document.getElementById('res-azimuth').innerText = `${Math.round(brg)}° (${Math.round(brg * 17.77).toString().padStart(4, '0')} MIL)`;
        }

        async function initSystem() {
            document.getElementById('start-screen').style.display = 'none';
            if (window.DeviceOrientationEvent && typeof DeviceOrientationEvent.requestPermission === 'function') {
                const res = await DeviceOrientationEvent.requestPermission();
                if (res === 'granted') window.addEventListener('deviceorientation', (e) => updateHeading(e.webkitCompassHeading || 360-e.alpha), true);
            } else window.addEventListener('deviceorientationabsolute', (e) => updateHeading(360 - e.alpha), true);

            map = L.map('map', { zoomControl: false, attributionControl: false });
            L.tileLayer('https://cyberjapandata.gsi.go.jp/xyz/seamlessphoto/{z}/{x}/{y}.jpg', { maxZoom: 18 }).addTo(map);
            selfMarker = L.marker([0,0], { icon: L.divIcon({ className:'d-marker', html:'<div id="self-arrow" class="direction-marker"></div>', iconSize:[20,20], iconAnchor:[10,10]}) }).addTo(map);

            restorePlots();
            const p2pEntry = document.createElement('div'); p2pEntry.className = 'custom-menu-item'; p2pEntry.innerHTML = '＞ 2地点間ナビ計算機';
            p2pEntry.onclick = () => {
                const opts = savedPlots.map((p, i) => `<option value="${i}">${p.name}</option>`).join('');
                document.getElementById('p2p-from').innerHTML = opts; document.getElementById('p2p-to').innerHTML = opts;
                document.getElementById('p2p-calc-panel').style.display = 'flex'; toggleMenu();
            };
            document.getElementById('menu-ext-area').appendChild(p2pEntry);

            map.on('move', () => {
                const c = map.getCenter();
                document.getElementById('center-mgrs').innerText = mgrs.forward([c.lng, c.lat]);
                if(selfPos) {
                    document.getElementById('range-val').innerText = `${Math.round(L.latLng(selfPos).distanceTo(c))} m`;
                    document.getElementById('bearing-val').innerText = `${getMilBearing(selfPos, [c.lat, c.lng])} MIL`;
                }
                document.getElementById('center-alt').innerText = "...";
                clearTimeout(altTimeout);
                altTimeout = setTimeout(() => fetchElevation(c.lat, c.lng, 'center-alt'), 600);
            });

            navigator.geolocation.watchPosition((pos) => {
                const lat = pos.coords.latitude, lon = pos.coords.longitude; selfPos = [lat, lon];
                const m = mgrs.forward([lon, lat]);
                document.getElementById('self-mgrs-c').innerText = m; document.getElementById('self-mgrs-m').innerText = m;
                fetchElevation(lat, lon, 'self-alt');
                if (!window.initialSet) { map.setView(selfPos, 17); window.initialSet = true; }
                selfMarker.setLatLng(selfPos);
                currentDeclination = - ( (lat - 37) * 0.2 + (lon - 135) * 0.1 + 7.5 );
            }, null, { enableHighAccuracy: true });
        }

        document.getElementById('plot-btn').onclick = () => {
            const n = prompt("地点名:", "地点-" + (savedPlots.length+1));
            if (n) { const c = map.getCenter(); saveAndPlot(c.lat, c.lng, mgrs.forward([c.lng, c.lat]), n); }
        };
        document.getElementById('input-btn').onclick = () => document.getElementById('input-panel').style.display = 'flex';
        document.getElementById('list-btn').onclick = () => {
            document.getElementById('plot-list-content').innerHTML = savedPlots.map((p, i) => `<div style="border-bottom:1px solid #002200; padding:10px 0; display:flex; justify-content:space-between;"><div><b>${p.name}</b><br><small>${p.mgrs}</small></div><button onclick="deletePlot(${i})" style="color:red; background:none; border:1px solid red;">消去</button></div>`).join('');
            document.getElementById('plot-list-panel').style.display = 'flex';
        };
        window.deletePlot = (i) => { savedPlots.splice(i, 1); localStorage.setItem('tactical_plots', JSON.stringify(savedPlots)); restorePlots(); document.getElementById('list-btn').onclick(); };
        document.getElementById('p2p-from').onchange = calculateP2P; document.getElementById('p2p-to').onchange = calculateP2P;
    </script>

    <script src="elevation.js"></script>
</body>
</html>
