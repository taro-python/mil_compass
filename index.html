<div id="info-map" class="info-panel">
    <span class="label">SELF MGRS</span>
    <div class="val"><span id="self-mgrs-m">---</span> <span id="self-alt" style="font-size:0.7rem; color:#00ffff;">(---m)</span></div>
    
    <span class="label">CENTER MGRS</span>
    <div class="val"><span id="center-mgrs">---</span> <span id="center-alt" style="font-size:0.7rem; color:#00ffff;">(---m)</span></div>
    
    <span class="label">RANGE / BRG</span>
    <div class="val">
        <span id="range-val" style="color:#ffff00;">0 m</span>
        <span id="bearing-val" style="color:#00ff00; margin-left:10px;">0000 MIL</span>
    </div>
</div>

<script>
// --- 高度取得関数 (国土地理院API) ---
async function getElevation(lat, lon) {
    try {
        const res = await fetch(`https://cyberjapandata2.gsi.go.jp/elevation/cgi/elevation.php?n=${lat}&e=${lon}&outtype=JSON`);
        const data = await res.json();
        return data.elevation !== "-----" ? Math.round(data.elevation) : "---";
    } catch (e) { return "---"; }
}

// --- 方位角計算関数 ---
function calculateBearingMil(start, end) {
    const lat1 = start[0] * Math.PI / 180;
    const lon1 = start[1] * Math.PI / 180;
    const lat2 = end[0] * Math.PI / 180;
    const lon2 = end[1] * Math.PI / 180;
    const y = Math.sin(lon2 - lon1) * Math.cos(lat2);
    const x = Math.cos(lat1) * Math.sin(lat2) - Math.sin(lat1) * Math.cos(lat2) * Math.cos(lon2 - lon1);
    let brg = Math.atan2(y, x) * 180 / Math.PI;
    brg = (brg + 360) % 360;
    return Math.round(brg * (6400 / 360)).toString().padStart(4, '0');
}

// --- map.on('move', ...) 内の処理を更新 ---
map.on('move', async () => {
    const center = map.getCenter();
    const cLatLon = [center.lat, center.lng];
    
    // 1. 座標表示
    document.getElementById('center-mgrs').innerText = mgrs.forward([center.lng, center.lat]);
    
    // 2. 距離と方位角の計算
    if(selfPos) {
        const dist = L.latLng(selfPos).distanceTo(center);
        document.getElementById('range-val').innerText = `${Math.round(dist)} m`;
        
        const mil = calculateBearingMil(selfPos, cLatLon);
        document.getElementById('bearing-val').innerText = `${mil} MIL`;
    }

    // 3. 中心標高の取得（頻繁なリクエストを避けるため簡易的な取得）
    const alt = await getElevation(center.lat, center.lng);
    document.getElementById('center-alt').innerText = `(${alt}m)`;
});

// --- watchPosition 内の処理を更新 ---
navigator.geolocation.watchPosition(async (pos) => {
    const lat = pos.coords.latitude, lon = pos.coords.longitude;
    selfPos = [lat, lon];
    const mCode = mgrs.forward([lon, lat]);
    
    document.getElementById('self-mgrs-c').innerText = mCode;
    document.getElementById('self-mgrs-m').innerText = mCode;

    // 自己位置の標高取得
    const alt = await getElevation(lat, lon);
    document.getElementById('self-alt').innerText = `(${alt}m)`;

    if (!window.initialSet) { map.setView(selfPos, 17); window.initialSet = true; }
    selfMarker.setLatLng(selfPos);
    currentDeclination = - ( (lat - 37) * 0.2 + (lon - 135) * 0.1 + 7.5 );
}, null, { enableHighAccuracy: true });
</script>
